<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Day Forecast Report</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="forecast-card">
        <h6>10-Day Forecast</h6>
        
        <div class="forecast-list">
            <div class="forecast-row">
                <span class="day">Today</span>
                <img src="yellow-circle.png" alt="weather icon" class="weather-icon">
                <span class="temp">39&deg;/26&deg;</span>
            </div>

            <div class="forecast-row">
                <span class="day">Friday 11 Oct</span>
                <img src="yellow-circle.png" alt="weather icon" class="weather-icon">
                <span class="temp">39&deg;/26&deg;</span>
            </div>

            <div class="forecast-row">
                <span class="day">Saturday 12 Oct</span>
                <img src="yellow-circle.png" alt="weather icon" class="weather-icon">
                <span class="temp">38&deg;/26&deg;</span>
            </div>

            <div class="forecast-row">
                <span class="day">Sunday 13 Oct</span>
                <img src="R.png" alt="weather icon" class="weather-icon">
                <span class="temp">37&deg;/27&deg;</span>
            </div>

            <div class="forecast-row">
                <span class="day">Monday 14 Oct</span>
                <img src="R.png" alt="weather icon" class="weather-icon">
                <span class="temp">36&deg;/27&deg;</span>
            </div>
            
            </div>
    </div>
</body>
</html>
